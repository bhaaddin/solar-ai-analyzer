<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Solar Roof Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: var(--bg); }
        .auth-card { max-width: 450px; width: 100%; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; }
        .alert-error { background: #ffebee; color: #c62828; border: 1px solid #c62828; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.85rem; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
        .btn { display: inline-block; padding: 10px 24px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
        .btn-primary { background: #2c5282; color: white; width: 100%; }
        .btn-primary:hover { background: #1a3a5c; }
        .auth-switch { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #666; }
        .auth-switch a { color: #2c5282; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="navbar" style="background: white; border-bottom: 1px solid #e9ecef; padding: 0 24px; height: 60px; display: flex; align-items: center;">
        <div style="max-width: 1400px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between;">
            <a href="index.html" style="font-size: 1.2rem; font-weight: 600; color: #1a1a2e; text-decoration: none;">🌞 AI Solar Roof Analyzer</a>
            <span style="color: #6c757d;">Government Portal</span>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <h1 style="margin-bottom: 8px;">🔐 Login</h1>
            <p style="color: #6c757d; margin-bottom: 24px;">Sign in to access the admin panel</p>

            <div id="errorMsg" class="alert alert-error" style="display: none;"></div>
            <div id="successMsg" class="alert alert-success" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="admin@ecuk.cz">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
            <p class="auth-switch"><a href="index.html">← Back to Dashboard</a></p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const API_URL = CONFIG.API_URL;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    successDiv.style.display = 'block';
                    successDiv.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1000);
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = data.error || 'Login failed';
                }
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Server error. Make sure the backend is running.';
            }
        });
    </script>
</body>
</html>
