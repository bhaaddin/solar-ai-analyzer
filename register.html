<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Solar Roof Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: var(--bg); }
        .auth-card { max-width: 500px; width: 100%; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; }
        .alert-error { background: #ffebee; color: #c62828; border: 1px solid #c62828; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.85rem; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
        .btn { display: inline-block; padding: 10px 24px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
        .btn-primary { background: #2c5282; color: white; width: 100%; }
        .btn-primary:hover { background: #1a3a5c; }
        .auth-switch { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #666; }
        h1 { margin-bottom: 8px; font-size: 1.8rem; text-align: center; }
        .subtitle { text-align: center; color: #6c757d; margin-bottom: 24px; }
    </style>
</head>
<body>
    <nav class="navbar" style="background: white; border-bottom: 1px solid #e9ecef; padding: 0 24px; height: 60px; display: flex; align-items: center;">
        <div style="max-width: 1400px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between;">
            <a href="index.html" style="font-size: 1.2rem; font-weight: 600; color: #1a1a2e; text-decoration: none;">🌞 AI Solar Roof Analyzer</a>
            <span style="color: #6c757d;">Government Portal</span>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <h1>📝 Create Account</h1>
            <p class="subtitle">Register for government AI platform access</p>

            <div id="errorMsg" class="alert alert-error" style="display: none;"></div>
            <div id="successMsg" class="alert alert-success" style="display: none;"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Username * (min. 3 characters)</label>
                    <input type="text" id="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required placeholder="your@email.cz">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label>Department / Organization</label>
                    <input type="text" id="department" placeholder="e.g., ECUK, Municipal Office">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+420 XXX XXX XXX">
                </div>
                <div class="form-group">
                    <label>Password * (min. 6 characters)</label>
                    <input type="password" id="password" required placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirm" required placeholder="Repeat your password">
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>

            <p class="auth-switch">Already have an account? <a href="login.html">Sign In</a></p>
            <p class="auth-switch"><a href="index.html">← Back to Dashboard</a></p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const API_URL = CONFIG.API_URL;

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const fullName = document.getElementById('fullName').value;
            const department = document.getElementById('department').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Validation
            if (username.length < 3) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Username must be at least 3 characters';
                return;
            }
            
            if (!email.includes('@')) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Enter a valid email address';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            if (password !== confirm) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Passwords do not match';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, fullName, department, phone })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    successDiv.style.display = 'block';
                    successDiv.textContent = 'Registration successful! Redirecting to dashboard...';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = data.error || 'Registration failed';
                }
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Server error. Make sure the backend is running.';
            }
        });
    </script>
</body>
</html>
